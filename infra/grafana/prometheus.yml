global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "lifeadmin-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "lifeadmin-processor"
    static_configs:
      - targets: ["processor:8002"]

  - job_name: "lifeadmin-agent"
    static_configs:
      - targets: ["agent:8003"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:7071"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
